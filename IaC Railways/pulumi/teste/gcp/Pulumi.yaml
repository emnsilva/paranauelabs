name: gcp_vm_yaml
description: "Infraestrutura de rede e computação GCP em múltiplas regiões"
runtime: yaml

config:
  GCP_PROJECT:
    type: string
    default: woven-goal-469100-q2
  GCP_REGION_PRIMARY:
    type: string
    default: southamerica-east1
  GCP_REGION_SECONDARY:
    type: string
    default: us-east-1
  machineType:
    type: string
    default: e2-micro

variables:
  startupScriptPrimary: |
    #!/bin/bash
    echo "Hello, World from Pulumi GCP Primary!" > index.html
    nohup python3 -m http.server 80 &
  startupScriptSecondary: |
    #!/bin/bash
    echo "Hello, World from Pulumi GCP Secondary!" > index.html
    nohup python3 -m http.server 80 &

resources:
  # PROVIDER GLOBAL
  gcp-global:
    type: pulumi:providers:gcp
    properties:
      project: ${GCP_PROJECT}

  # PROVIDERS REGIONAIS
  gcp-primary:
    type: pulumi:providers:gcp
    properties:
      project: ${GCP_PROJECT}
      region: ${GCP_REGION_PRIMARY}

  gcp-secondary:
    type: pulumi:providers:gcp
    properties:
      project: ${GCP_PROJECT}
      region: ${GCP_REGION_SECONDARY}

  # RECURSOS GLOBAIS
  vpc-network:
    type: gcp:compute:Network
    options:
      provider: ${gcp-global}
    properties:
      autoCreateSubnetworks: false

  firewall-primary:
    type: gcp:compute:Firewall
    options:
      provider: ${gcp-global}
    properties:
      network: ${vpc-network.name}
      allows:
        - protocol: tcp
          ports: ["80"]
      sourceRanges: ["0.0.0.0/0"]
      targetTags: ["http-server"]

  # RECURSOS REGIONAIS PRIMÁRIOS
  subnet-primary:
    type: gcp:compute:Subnetwork
    options:
      provider: ${gcp-primary}
    properties:
      network: ${vpc-network.id}
      ipCidrRange: 10.0.1.0/24
      region: ${GCP_REGION_PRIMARY}

  server-primary:
    type: gcp:compute:Instance
    options:
      provider: ${gcp-primary}
    properties:
      machineType: ${machineType}
      zone: southamerica-east1-a
      tags: ["http-server"]
      bootDisk:
        initializeParams:
          image: "debian-cloud/debian-11"
      networkInterfaces:
        - subnetwork: ${subnet-primary.id}
          accessConfigs: [{}]
      metadataStartupScript: ${startupScriptPrimary}

  # RECURSOS REGIONAIS SECUNDÁRIOS
  subnet-secondary:
    type: gcp:compute:Subnetwork
    options:
      provider: ${gcp-secondary}
    properties:
      network: ${vpc-network.id}
      ipCidrRange: 10.0.2.0/24
      region: ${GCP_REGION_SECONDARY}

  server-secondary:
    type: gcp:compute:Instance
    options:
      provider: ${gcp-secondary}
    properties:
      machineType: ${machineType}
      zone: us-east1-b
      tags: ["http-server"]
      bootDisk:
        initializeParams:
          image: "debian-cloud/debian-11"
      networkInterfaces:
        - subnetwork: ${subnet-secondary.id}
          accessConfigs: [{}]
      metadataStartupScript: ${startupScriptSecondary}

outputs:
  primaryIp: ${server-primary.networkInterfaces[0].accessConfigs[0].natIp}
  secondaryIp: ${server-secondary.networkInterfaces[0].accessConfigs[0].natIp}