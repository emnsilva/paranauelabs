name: IaC Railways
description: "Infraestrutura de rede e computação AWS em múltiplas regiões com OIDC"
runtime: yaml

# VARIÁVEIS DE CONFIGURAÇÃO
# Define as regiões AWS e tamanhos das instâncias onde a infraestrutura será criada
# São como "configurações" que você precisa fornecer antes de executar
config:
  AWS_REGION_PRIMARY:
    type: string
    default: sa-east-1
  AWS_REGION_SECONDARY:
    type: string
    default: us-east-1
  instanceType:
    type: string
    default: t3.micro
  vpcNetworkCidr:
    type: string
    default: 10.0.0.0/16

# Busca dinamicamente a imagem (AMI) do Amazon Linux 2023 em tempo de execução
variables:
  ami_primary:
    fn::invoke:
      function: aws:ec2:getAmi
      arguments:
        filters:
          - name: name
            values: 
              - "al2023-ami-2023.*-x86_64"
        owners: 
          - "amazon"
        mostRecent: true
      return: id

  ami_secondary:
    fn::invoke:
      function: aws:ec2:getAmi
      arguments:
        filters:
          - name: name
            values: 
              - "al2023-ami-2023.*-x86_64"
        owners: 
          - "amazon"
        mostRecent: true
      return: id

  # Script de inicialização do servidor HTTP (User Data)
  userData: |
    #!/bin/bash
    echo "Hello, World from Pulumi!" > index.html
    nohup python3 -m http.server 80 &

# Configura conexões com a AWS em duas regiões diferentes
resources:
  aws.primary:
    type: pulumi:providers:aws
    properties:
      region: ${AWS_REGION_PRIMARY}

  aws.secondary:
    type: pulumi:providers:aws
    properties:
      region: ${AWS_REGION_SECONDARY}

  # Recursos da região primária

  vpc_primary:
    type: aws:ec2:Vpc
    options:
      provider: ${aws.primary}
    properties:
      cidrBlock: ${vpcNetworkCidr}
      enableDnsHostnames: true
      enableDnsSupport: true

  gateway_primary:
    type: aws:ec2:InternetGateway
    options:
      provider: ${aws.primary}
    properties:
      vpcId: ${vpc_primary.id}

  subnet_primary:
    type: aws:ec2:Subnet
    options:
      provider: ${aws.primary}
    properties:
      vpcId: ${vpc_primary.id}
      cidrBlock: 10.0.1.0/24
      mapPublicIpOnLaunch: true

  route_table_primary:
    type: aws:ec2:RouteTable
    options:
      provider: ${aws.primary}
    properties:
      vpcId: ${vpc_primary.id}
      routes:
        - cidrBlock: 0.0.0.0/0
          gatewayId: ${gateway_primary.id}

  route_association_primary:
    type: aws:ec2:RouteTableAssociation
    options:
      provider: ${aws.primary}
    properties:
      subnetId: ${subnet_primary.id}
      routeTableId: ${route_table_primary.id}

  sec_group_primary:
    type: aws:ec2:SecurityGroup
    options:
      provider: ${aws.primary}
    properties:
      description: Enable HTTP access
      vpcId: ${vpc_primary.id}
      ingress:
        - fromPort: 80
          toPort: 80
          protocol: tcp
          cidrBlocks: 
            - 0.0.0.0/0
      egress:
        - fromPort: 0
          toPort: 0
          protocol: "-1"
          cidrBlocks: 
            - 0.0.0.0/0

  server_primary:
    type: aws:ec2:Instance
    options:
      provider: ${aws.primary}
    properties:
      instanceType: ${instanceType}
      subnetId: ${subnet_primary.id}
      vpcSecurityGroupIds: 
        - ${sec_group_primary.id}
      userData: ${userData}
      ami: ${ami_primary}
      tags:
        Name: webserver-primary

    # Recursos da região secundária

  vpc_secondary:
    type: aws:ec2:Vpc
    options:
      provider: ${aws.secondary}
    properties:
      cidrBlock: ${vpcNetworkCidr}
      enableDnsHostnames: true
      enableDnsSupport: true

  gateway_secondary:
    type: aws:ec2:InternetGateway
    options:
      provider: ${aws.secondary}
    properties:
      vpcId: ${vpc_secondary.id}

  subnet_secondary:
    type: aws:ec2:Subnet
    options:
      provider: ${aws.secondary}
    properties:
      vpcId: ${vpc_secondary.id}
      cidrBlock: 10.0.1.0/24
      mapPublicIpOnLaunch: true

  route_table_secondary:
    type: aws:ec2:RouteTable
    options:
      provider: ${aws.secondary}
    properties:
      vpcId: ${vpc_secondary.id}
      routes:
        - cidrBlock: 0.0.0.0/0
          gatewayId: ${gateway_secondary.id}

  route_association_secondary:
    type: aws:ec2:RouteTableAssociation
    options:
      provider: ${aws.secondary}
    properties:
      subnetId: ${subnet_secondary.id}
      routeTableId: ${route_table_secondary.id}

  sec_group_secondary:
    type: aws:ec2:SecurityGroup
    options:
      provider: ${aws.secondary}
    properties:
      description: Enable HTTP access
      vpcId: ${vpc_secondary.id}
      ingress:
        - fromPort: 80
          toPort: 80
          protocol: tcp
          cidrBlocks: 
            - 0.0.0.0/0
      egress:
        - fromPort: 0
          toPort: 0
          protocol: "-1"
          cidrBlocks: 
            - 0.0.0.0/0

  server_secondary:
    type: aws:ec2:Instance
    options:
      provider: ${aws.secondary}
    properties:
      instanceType: ${instanceType}
      subnetId: ${subnet_secondary.id}
      vpcSecurityGroupIds: 
        - ${sec_group_secondary.id}
      userData: ${userData}
      ami: ${ami_secondary}
      tags:
        Name: webserver-secondary

# EXPORTS (Equivalente aos Outputs do Terraform)
outputs:
  primaryUrl: http://${server_primary.publicDns}
  secondaryUrl: http://${server_secondary.publicDns}