name: OpenTofu GCP OIDC

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: OpenTofu Init
        run: tofu init
        working-directory: 01-iac-railways/opentofu/teste/gcp

      - name: OpenTofu Plan
        env:
          TF_VAR_GCP_PROJECT: ${{ vars.GCP_PROJECT_ID }}
          TF_VAR_GCP_PRIMARY_REGION: ${{ vars.GCP_REGION_PRIMARY }}
          TF_VAR_GCP_SECONDARY_REGION: ${{ vars.GCP_REGION_SECONDARY }}
          # Não precisa do GOOGLE_CREDENTIALS_B64 porque o OIDC já provê credenciais automáticas
        run: tofu plan -input=false -no-color
        working-directory: 01-iac-railways/opentofu/teste/gcp

      # - name: OpenTofu Apply
      #   if: github.ref == 'refs/heads/main'
      #   env:
      #     TF_VAR_GCP_PROJECT: ${{ vars.GCP_PROJECT_ID }}
      #     TF_VAR_GCP_PRIMARY_REGION: ${{ vars.GCP_REGION_PRIMARY }}
      #     TF_VAR_GCP_SECONDARY_REGION: ${{ vars.GCP_REGION_SECONDARY }}
      #   run: tofu apply -auto-approve -input=false
      #   working-directory: 01-iac-railways/opentofu/teste/gcp